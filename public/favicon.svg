<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0f0f10"/>

  <!-- Clipped content -->
  <g clip-path="url(#clip)">

    <!-- Outer arc -->
    <path d="M 28 50 A 22 22 0 0 1 72 50" fill="none" stroke="#166534" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 28 50 A 22 22 0 0 0 72 50" fill="none" stroke="#166534" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Mid arc -->
    <path d="M 34 50 A 16 16 0 0 1 66 50" fill="none" stroke="#16a34a" stroke-width="4.5" stroke-linecap="round" opacity="0.75"/>
    <path d="M 34 50 A 16 16 0 0 0 66 50" fill="none" stroke="#16a34a" stroke-width="4.5" stroke-linecap="round" opacity="0.75"/>

    <!-- Inner arc -->
    <path d="M 40 50 A 10 10 0 0 1 60 50" fill="none" stroke="#4ade80" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 40 50 A 10 10 0 0 0 60 50" fill="none" stroke="#4ade80" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="50" cy="50" r="5" fill="#4ade80"/>

    <!-- Pulse ring -->
    <circle cx="50" cy="50" r="9" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.35"/>

  </g>

  <!-- Subtle border -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
</svg>
